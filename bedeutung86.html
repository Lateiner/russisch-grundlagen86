<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedeutungs-Matching: Russische Verben</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p.desc { color: #666; margin-bottom: 30px; }

        .matching-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            min-height: 300px;
        }

        @media (max-width: 600px) {
            .matching-grid { grid-template-columns: 1fr; }
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            padding: 15px;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.4s ease;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            user-select: none;
        }

        .card:hover { border-color: var(--secondary-color); background: #f0f7ff; }
        .card.selected { border-color: var(--secondary-color); background: #e1f0ff; transform: scale(1.03); }
        .card.wrong { border-color: #e74c3c; background: #fdecea; }
        
        /* Zustand für verschwundene Karten */
        .card.matched {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-restart { background: #95a5a6; color: white; }
        .btn-solution { background: var(--secondary-color); color: white; }
        button:hover { opacity: 0.9; }

        #win-message {
            display: none;
            font-size: 1.5rem;
            color: #27ae60;
            margin: 20px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bedeutungs-Matching</h1>
    <p class="desc">Klicke ein Paar an. Richtige Paare verschwinden.</p>

    <div id="win-message">Gut gemacht! Alles gelöst.</div>

    <div class="matching-grid" id="grid">
        <div class="column" id="verbs-col"></div>
        <div class="column" id="defs-col"></div>
    </div>

    <div class="controls">
        <button class="btn-restart" onclick="initGame()">Neustart</button>
        <button class="btn-solution" id="solution-btn" onclick="showSolution()">Lösung</button>
    </div>
</div>

<script>
    const pairs = [
        { id: 1, verb: "ВЫЯВИТЬ", def: "Etwas Verborgenes finden / feststellen (z.B. Fehler).", color: "#FFD1DC" },
        { id: 2, verb: "ОБЪЯВИТЬ", def: "Etwas öffentlich mitteilen / verkünden (z.B. Ergebnisse).", color: "#C1E1C1" },
        { id: 3, verb: "ЗАЯВИТЬ", def: "Offiziell die eigene Meinung äußern oder einen Vorfall melden.", color: "#B3E5FC" },
        { id: 4, verb: "ВЫЯВЛЯТЬ", def: "Derselbe Vorgang wie ВЫЯВИТЬ, aber als Prozess (unvollendet).", color: "#FDFD96" },
        { id: 5, verb: "ОБЪЯВЛЕНИЕ", def: "Das Substantiv: Eine Anzeige, ein Aushang oder eine Durchsage.", color: "#E6E6FA" }
    ];

    let selectedVerb = null;
    let selectedDef = null;
    let matchesFound = 0;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
        const verbCol = document.getElementById('verbs-col');
        const defCol = document.getElementById('defs-col');
        const winMsg = document.getElementById('win-message');
        verbCol.innerHTML = '';
        defCol.innerHTML = '';
        winMsg.style.display = 'none';
        selectedVerb = null;
        selectedDef = null;
        matchesFound = 0;

        const shuffledVerbs = shuffle([...pairs]);
        const shuffledDefs = shuffle([...pairs]);

        shuffledVerbs.forEach(p => {
            const div = document.createElement('div');
            div.className = 'card';
            div.textContent = p.verb;
            div.dataset.id = p.id;
            div.onclick = () => selectCard(div, 'verb');
            verbCol.appendChild(div);
        });

        shuffledDefs.forEach(p => {
            const div = document.createElement('div');
            div.className = 'card';
            div.textContent = p.def;
            div.dataset.id = p.id;
            div.onclick = () => selectCard(div, 'def');
            defCol.appendChild(div);
        });
    }

    function selectCard(card, type) {
        if (card.classList.contains('matched')) return;

        const colId = type === 'verb' ? 'verbs-col' : 'defs-col';
        document.querySelectorAll(`#${colId} .card`).forEach(c => c.classList.remove('selected', 'wrong'));

        card.classList.add('selected');

        if (type === 'verb') selectedVerb = card;
        else selectedDef = card;

        if (selectedVerb && selectedDef) {
            checkMatch();
        }
    }

    function checkMatch() {
        if (selectedVerb.dataset.id === selectedDef.dataset.id) {
            const v = selectedVerb;
            const d = selectedDef;
            v.classList.add('matched');
            d.classList.add('matched');
            matchesFound++;
            selectedVerb = null;
            selectedDef = null;
            checkWin();
        } else {
            const v = selectedVerb;
            const d = selectedDef;
            v.classList.add('wrong');
            d.classList.add('wrong');
            selectedVerb = null;
            selectedDef = null;
            setTimeout(() => {
                v.classList.remove('wrong', 'selected');
                d.classList.remove('wrong', 'selected');
            }, 500);
        }
    }

    function showSolution() {
        // Alle Karten finden, die noch nicht "matched" sind
        const allCards = document.querySelectorAll('.card:not(.matched)');
        
        allCards.forEach(card => {
            const pairData = pairs.find(p => p.id == card.dataset.id);
            // Paarweise Einfärbung
            card.style.backgroundColor = pairData.color;
            card.style.borderColor = pairData.color;
            card.classList.remove('selected', 'wrong');
        });

        // Nach einer kurzen Verzögerung verschwinden lassen
        setTimeout(() => {
            allCards.forEach(card => {
                card.classList.add('matched');
            });
            matchesFound = pairs.length;
            checkWin();
        }, 1500);
    }

    function checkWin() {
        if (matchesFound === pairs.length) {
            setTimeout(() => {
                document.getElementById('win-message').style.display = 'block';
            }, 500);
        }
    }

    window.onload = initGame;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprechblasen-Zuordnung: Wer sagt was?</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #1b5e20; /* Kräftiges Grün */
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; color: var(--primary-color); }
        p.desc { color: #666; margin-bottom: 30px; }

        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            min-height: 400px;
        }

        @media (max-width: 650px) {
            .game-grid { grid-template-columns: 1fr; }
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .item {
            padding: 15px;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .item:hover:not(.matched):not(.solved) { border-color: var(--secondary-color); background: #f0f7ff; }
        .item.selected { border-color: var(--secondary-color); background: #e1f0ff; transform: scale(1.02); }
        .item.wrong { border-color: #c62828; background: #fdecea; }
        
        /* Zustand für vom Schüler gefundene Paare (verschwinden) */
        .item.matched {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: var(--success-color) !important;
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        /* Zustand für die Lösung (bleiben sichtbar & farbig) */
        .item.solved {
            color: white !important;
            cursor: default;
            pointer-events: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border: none;
        }

        .bubble { font-style: italic; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            color: white;
        }

        .btn-restart { background: #95a5a6; }
        .btn-solution { background: var(--secondary-color); }
        button:hover { opacity: 0.9; }

        #win-message {
            display: none;
            font-size: 1.4rem;
            color: var(--success-color);
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sprechblasen-Zuordnung</h1>
    <p class="desc">Wer würde das sagen? Ordne die Person dem passenden russischen Satz zu.</p>

    <div id="win-message">Hervorragend! Alles zugeordnet.</div>

    <div class="game-grid" id="grid">
        <div class="column" id="person-col"></div>
        <div class="column" id="sentence-col"></div>
    </div>

    <div class="controls">
        <button class="btn-restart" onclick="initGame()">Neustart</button>
        <button class="btn-solution" onclick="showSolution()">Lösung anzeigen</button>
    </div>
</div>

<script>
    const data = [
        { id: 1, person: "Полицейский (Polizist)", sentence: "Я хочу заявить о краже.", color: "#4a148c" }, // Lila
        { id: 2, person: "Диктор (Nachrichtensprecher)", sentence: "Позвольте объявить результаты конкурса.", color: "#0d47a1" }, // Blau
        { id: 3, person: "Врач (Arzt)", sentence: "Этот анализ поможет выявить заболевание.", color: "#004d40" }, // Teal
        { id: 4, person: "Директор (Direktor)", sentence: "Я должен заявить о своём увольнении.", color: "#e65100" }, // Orange
        { id: 5, person: "Инспектор (Inspektor)", sentence: "Проверка выявила ошибки в работе компании.", color: "#3e2723" }, // Braun
        { id: 6, person: "Президент (Präsident)", sentence: "Я объявляю войну законченной.", color: "#880e4f" }  // Beere
    ];

    let selectedPerson = null;
    let selectedSentence = null;
    let matchesCount = 0;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
        const personCol = document.getElementById('person-col');
        const sentenceCol = document.getElementById('sentence-col');
        const winMsg = document.getElementById('win-message');
        
        personCol.innerHTML = '';
        sentenceCol.innerHTML = '';
        winMsg.style.display = 'none';
        selectedPerson = null;
        selectedSentence = null;
        matchesCount = 0;

        const shuffledPeople = shuffle([...data]);
        const shuffledSentences = shuffle([...data]);

        shuffledPeople.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = item.person;
            div.dataset.id = item.id;
            div.onclick = () => selectItem(div, 'person');
            personCol.appendChild(div);
        });

        shuffledSentences.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item bubble';
            div.textContent = `«${item.sentence}»`;
            div.dataset.id = item.id;
            div.onclick = () => selectItem(div, 'sentence');
            sentenceCol.appendChild(div);
        });
    }

    function selectItem(el, type) {
        if (el.classList.contains('matched') || el.classList.contains('solved')) return;

        const colId = type === 'person' ? 'person-col' : 'sentence-col';
        document.querySelectorAll(`#${colId} .item`).forEach(i => i.classList.remove('selected', 'wrong'));

        el.classList.add('selected');

        if (type === 'person') selectedPerson = el;
        else selectedSentence = el;

        if (selectedPerson && selectedSentence) {
            checkMatch();
        }
    }

    function checkMatch() {
        if (selectedPerson.dataset.id === selectedSentence.dataset.id) {
            const p = selectedPerson;
            const s = selectedSentence;
            
            // Gefundenes Paar kräftig grün markieren
            p.classList.add('selected'); // kurzzeitig für die Farbe
            s.classList.add('selected');
            p.style.backgroundColor = "var(--success-color)";
            s.style.backgroundColor = "var(--success-color)";
            p.style.color = "white";
            s.style.color = "white";

            setTimeout(() => {
                p.classList.add('matched');
                s.classList.add('matched');
                matchesCount++;
                if (matchesCount === data.length) {
                    document.getElementById('win-message').style.display = 'block';
                }
            }, 600);

            selectedPerson = null;
            selectedSentence = null;
        } else {
            const p = selectedPerson;
            const s = selectedSentence;
            p.classList.add('wrong');
            s.classList.add('wrong');
            selectedPerson = null;
            selectedSentence = null;
            setTimeout(() => {
                p.classList.remove('wrong', 'selected');
                s.classList.remove('wrong', 'selected');
            }, 500);
        }
    }

    function showSolution() {
        data.forEach(pair => {
            const items = document.querySelectorAll(`[data-id="${pair.id}"]`);
            items.forEach(item => {
                if (!item.classList.contains('matched')) {
                    item.classList.remove('selected', 'wrong');
                    item.classList.add('solved');
                    item.style.backgroundColor = pair.color;
                }
            });
        });
        
        // Buttons deaktivieren nach Lösung
        document.querySelectorAll('.item').forEach(i => i.style.pointerEvents = 'none');
        document.getElementById('win-message').style.display = 'block';
        document.getElementById('win-message').textContent = "Hier ist die korrekte Zuordnung:";
    }

    window.onload = initGame;
</script>

</body>
</html>

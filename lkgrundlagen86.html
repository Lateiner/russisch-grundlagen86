<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lernkartei: Russisch - Deutsch</title>
    <style>
        :root {
            --bg-color: #f0f4f1;
            --primary-green: #2e7d32;
            --secondary-green: #4caf50;
            --accent-green: #a5d6a7;
            --card-front-bg: #ffffff;
            --card-back-bg: #e8f5e9;
            --text-color: #1b5e20;
            --shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 1.8rem;
            color: var(--primary-green);
        }

        .progress {
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.1rem;
            background: var(--accent-green);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Flashcard 3D Effekt */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 350px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--shadow);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--accent-green);
        }

        .card-front {
            background-color: var(--card-front-bg);
        }

        .card-back {
            background-color: var(--card-back-bg);
            transform: rotateY(180deg);
        }

        .voc-text {
            font-size: 2.2rem;
            font-weight: bold;
            word-wrap: break-word;
            max-width: 100%;
        }

        .card-label {
            position: absolute;
            top: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }

        /* Navigation & Buttons */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .main-nav {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--primary-green);
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex: 1;
        }

        button:hover {
            background-color: var(--secondary-green);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-alt {
            background-color: #558b2f;
        }

        .btn-start {
            background-color: #1b5e20;
        }

        /* Keyboard Info */
        .hint {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #666;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .flashcard-container { height: 300px; }
            .voc-text { font-size: 1.8rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russisch-Lernkartei</h1>
    <div class="progress" id="progress">1 / 55</div>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <span class="card-label">Russisch</span>
                <div class="voc-text" id="front-text">Lade...</div>
            </div>
            <div class="card-face card-back">
                <span class="card-label">Deutsch</span>
                <div class="voc-text" id="back-text">Lade...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="main-nav">
            <button onclick="prevCard()">← Vorherige</button>
            <button onclick="nextCard()">Nächste →</button>
        </div>
        <button class="btn-alt" onclick="shuffleCards()">Mischen</button>
        <button class="btn-start" onclick="goToStart()">An den Anfang</button>
    </div>

    <div class="hint">
        <b>Tastatur:</b> Leertaste/Enter: Drehen | Pfeile: Blättern | Pos1: Anfang
    </div>
</div>

<script>
    // Die Vokabelliste
    const rawData = [
        ["выявля́ть / вы́явить", "feststellen, aufdecken, ermitteln"],
        ["объявля́ть / объяви́ть", "verkünden, bekannt geben, erklären"],
        ["заявля́ть / заяви́ть", "erklären, anmelden, offiziell mitteilen"],
        ["сообща́ть / сообщи́ть", "mitteilen, benachrichtigen"],
        ["находи́ть / найти́", "finden"],
        ["обнару́живать / обнару́жить", "entdecken, ausfindig machen"],
        ["рассма́тривать / рассмотре́ть", "prüfen, untersuchen, bearbeiten"],
        ["подава́ть / пода́ть", "einreichen, abgeben"],
        ["писа́ть / написа́ть", "schreiben"],
        ["подпи́сывать / подписа́ть", "unterschreiben"],
        ["принима́ть / приня́ть", "annehmen, empfangen"],
        ["увольня́ться / уво́литься", "kündigen, den Dienst quittieren"],
        ["чи́нить / почини́ть", "reparieren"],
        ["звони́ть / позвони́ть", "anrufen"],
        ["зака́зывать / заказа́ть", "bestellen, anfordern"],
        ["отзыва́ть / отозва́ть", "zurückziehen"],
        ["называ́ть / назва́ть", "nennen, bezeichnen"],
        ["дела́ть / сде́лать", "machen, tätigen"],
        ["объявле́ние", "Anzeige, Aushang, Durchsage, Ankündigung"],
        ["заявле́ние", "offizielles Schreiben, Antrag, (Diebstahls-)Anzeige"],
        ["зая́вка", "Anforderung, Bestellung, Bedarfsanmeldung, Reklamation"],
        ["оши́бка", "Fehler"],
        ["кра́жа", "Diebstahl"],
        ["увольне́ние", "Kündigung, Rücktritt, Entlassung"],
        ["результа́т", "Ergebnis"],
        ["экза́мен", "Prüfung"],
        ["заболева́ние", "Erkrankung"],
        ["боле́знь", "Krankheit"],
        ["прове́рка", "Prüfung, Kontrolle, Inspektion"],
        ["конку́рс", "Wettbewerb"],
        ["поли́ция", "Polizei"],
        ["лифт", "Aufzug, Fahrstuhl"],
        ["интерне́т", "Internet"],
        ["газе́та", "Zeitung"],
        ["врач", "Arzt"],
        ["дире́ктор", "Direktor"],
        ["президе́нт", "Präsident"],
        ["война́", "Krieg"],
        ["домашнее наси́лие", "häusliche Gewalt"],
        ["анализ", "Analyse"],
        ["компа́ния", "Unternehmen, Firma"],
        ["рабо́та", "Arbeit"],
        ["реше́ние", "Entscheidung, Lösung"],
        ["сообще́ние", "Mitteilung, Nachricht"],
        ["докуме́нт", "Dokument"],
        ["приложе́ние", "App, Anwendung"],
        ["ма́стер", "Handwerker, Fachmann"],
        ["о́тпуск", "Urlaub"],
        ["до́лжность", "Stelle, Amt, Position"],
        ["официа́льный", "offiziell, formell"],
        ["разгово́рный", "umgangssprachlich, informell"],
        ["серьёзный", "ernst, schwerwiegend"],
        ["зако́ченный", "beendet, abgeschlossen"],
        ["актуа́льный", "aktuell"],
        ["правильно", "richtig, korrekt"]
    ];

    let cards = rawData.map(item => ({ rus: item[0], ger: item[1] }));
    let currentIndex = 0;

    const cardEl = document.getElementById('card');
    const frontText = document.getElementById('front-text');
    const backText = document.getElementById('back-text');
    const progressEl = document.getElementById('progress');

    // Initialisierung
    function updateUI() {
        // Karte zurückdrehen bevor Text gewechselt wird
        cardEl.classList.remove('flipped');
        
        setTimeout(() => {
            const currentCard = cards[currentIndex];
            frontText.textContent = currentCard.rus;
            backText.textContent = currentCard.ger;
            progressEl.textContent = `${currentIndex + 1} / ${cards.length}`;
            
            adjustFontSize(frontText);
            adjustFontSize(backText);
        }, 150);
    }

    function adjustFontSize(element) {
        const text = element.textContent;
        if (text.length > 50) {
            element.style.fontSize = "1.2rem";
        } else if (text.length > 25) {
            element.style.fontSize = "1.6rem";
        } else {
            element.style.fontSize = "2.2rem";
        }
    }

    function flipCard() {
        cardEl.classList.toggle('flipped');
    }

    function nextCard() {
        if (currentIndex < cards.length - 1) {
            currentIndex++;
            updateUI();
        } else {
            // Optional: Zum Anfang springen wenn am Ende angelangt
            currentIndex = 0;
            updateUI();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateUI();
        } else {
            currentIndex = cards.length - 1;
            updateUI();
        }
    }

    function shuffleCards() {
        // Fisher-Yates Shuffle
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        currentIndex = 0;
        updateUI();
    }

    function goToStart() {
        currentIndex = 0;
        updateUI();
    }

    // Tastatursteuerung
    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case ' ':
            case 'Enter':
                e.preventDefault();
                flipCard();
                break;
            case 'ArrowRight':
                nextCard();
                break;
            case 'ArrowLeft':
                prevCard();
                break;
            case 'Home':
                goToStart();
                break;
        }
    });

    // Start
    updateUI();
</script>

</body>
</html>

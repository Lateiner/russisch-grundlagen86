<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wahr oder Falsch: ЗАЯВЛЕНИЕ vs. ЗАЯВКА</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #1b5e20; /* Kräftiges Grün */
            --error-color: #c62828;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 { font-size: 1.5rem; color: var(--primary-color); margin-bottom: 5px; }
        .progress { color: #888; font-size: 0.9rem; margin-bottom: 25px; font-weight: bold; }

        /* Statement Box */
        .statement-card {
            background: #f9f9f9;
            border-left: 5px solid var(--secondary-color);
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 8px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .statement-text {
            font-size: 1.2rem;
            color: #333;
            line-height: 1.5;
            font-weight: 500;
        }

        /* Buttons */
        .choice-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .choice-btn {
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--primary-color);
        }

        .choice-btn:hover:not(:disabled) {
            border-color: var(--secondary-color);
            background: #f0f7ff;
        }

        .choice-btn.correct {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: var(--success-color) !important;
        }

        .choice-btn.wrong {
            background-color: var(--error-color) !important;
            color: white !important;
            border-color: var(--error-color) !important;
        }

        /* Feedback Area */
        .feedback-area {
            min-height: 60px;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }

        .explanation { font-size: 0.95rem; color: #555; font-style: italic; margin-top: 5px; }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .nav-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            background: #95a5a6;
        }

        #next-btn { background: var(--primary-color); display: none; }

        #final-screen { display: none; padding: 20px; }
        #final-screen h2 { color: var(--success-color); }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-ui">
        <h1>Wahr oder Falsch?</h1>
        <div class="progress" id="progress">Frage 1 von 10</div>

        <div class="statement-card">
            <div class="statement-text" id="statement">Lade Aussage...</div>
        </div>

        <div class="choice-container">
            <button class="choice-btn" id="btn-true" onclick="handleChoice(true)">Wahr</button>
            <button class="choice-btn" id="btn-false" onclick="handleChoice(false)">Falsch</button>
        </div>

        <div id="feedback" class="feedback-area">
            <div id="feedback-text"></div>
            <div id="explanation-text" class="explanation"></div>
        </div>
    </div>

    <div id="final-screen">
        <h2>Hervorragend!</h2>
        <p>Du hast alle 10 Aussagen bearbeitet und den Unterschied zwischen <b>ЗАЯВЛЕНИЕ</b> und <b>ЗАЯВКА</b> vertieft.</p>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="restartQuiz()">Neustart</button>
        <button class="nav-btn" onclick="showSolution()">Lösung</button>
        <button class="nav-btn" id="next-btn" onclick="nextQuestion()">Weiter</button>
    </div>
</div>

<script>
    const quizData = [
        { s: "Eine ЗАЯВКА schreibt man, wenn man offiziell kündigen will.", a: false, e: "Falsch. Dafür nutzt man ein ЗАЯВЛЕНИЕ об увольнении." },
        { s: "ЗАЯВЛЕНИЕ nutzt man, wenn man einen Diebstahl bei der Polizei meldet.", a: true, e: "Wahr. Das ist eine offizielle Anzeige (заявление о краже)." },
        { s: "Wenn der Aufzug im Haus kaputt ist, erstellt man eine ЗАЯВКА.", a: true, e: "Wahr. Es ist eine Anforderung für eine Serviceleistung." },
        { s: "Das Wort ЗАЯВКА wird meist für offizielle Gerichtsdokumente genutzt.", a: false, e: "Falsch. Gerichte nutzen ЗАЯВЛЕНИЕ oder andere juristische Begriffe." },
        { s: "Man schreibt ein ЗАЯВЛЕНИЕ, um offiziell Urlaub zu beantragen.", a: true, e: "Wahr. Ein Urlaubsantrag ist ein offizielles Dokument (заявление на отпуск)." },
        { s: "Eine ЗАЯВКА ist eine Mitteilung, dass man etwas benötigt (z.B. Internet).", a: true, e: "Wahr. Es ist eine Bedarfsanmeldung." },
        { s: "Wenn man neue Büromaterialien bestellt, schreibt man ein ЗАЯВЛЕНИЕ.", a: false, e: "Falsch. Das ist eine ЗАЯВКА (Materialanforderung)." },
        { s: "Das Verb ЗАЯВИТЬ ist die Wurzel für das Wort ЗАЯВЛЕНИЕ.", a: true, e: "Wahr. ЗАЯВИТЬ (erklären) -> ЗАЯВЛЕНИЕ (Erklärung)." },
        { s: "ЗАЯВЛЕНИЕ wird oft in einer App genutzt, um einen Handwerker zu rufen.", a: false, e: "Falsch. In Apps erstellt man meist eine ЗАЯВКА." },
        { s: "Ein ЗАЯВЛЕНИЕ wird oft offiziell eingereicht (подать) und geprüft (рассмотреть).", a: true, e: "Wahr. Das sind typische Verben für offizielle Dokumente." }
    ];

    let currentIdx = 0;
    let shuffledData = [];
    let answered = false;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initQuiz() {
        shuffledData = shuffle([...quizData]);
        currentIdx = 0;
        document.getElementById('final-screen').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        const q = shuffledData[currentIdx];
        document.getElementById('progress').textContent = `Aussage ${currentIdx + 1} von 10`;
        document.getElementById('statement').textContent = `„${q.s}“`;
        
        // Reset Buttons
        const btnT = document.getElementById('btn-true');
        const btnF = document.getElementById('btn-false');
        btnT.className = 'choice-btn';
        btnF.className = 'choice-btn';
        btnT.disabled = false;
        btnF.disabled = false;

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function handleChoice(userChoice) {
        if (answered) return;
        answered = true;

        const q = shuffledData[currentIdx];
        const btnT = document.getElementById('btn-true');
        const btnF = document.getElementById('btn-false');
        const feedback = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedback-text');
        const explanationText = document.getElementById('explanation-text');

        btnT.disabled = true;
        btnF.disabled = true;

        const isCorrect = (userChoice === q.a);

        if (q.a === true) {
            btnT.classList.add('correct');
            if (!isCorrect) btnF.classList.add('wrong');
        } else {
            btnF.classList.add('correct');
            if (!isCorrect) btnT.classList.add('wrong');
        }

        feedback.style.display = 'block';
        feedbackText.textContent = isCorrect ? "Richtig!" : "Nicht ganz...";
        feedbackText.style.color = isCorrect ? "var(--success-color)" : "var(--error-color)";
        explanationText.textContent = q.e;

        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        if (currentIdx < shuffledData.length - 1) {
            currentIdx++;
            loadQuestion();
        } else {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('progress').textContent = "Abgeschlossen";
        }
    }

    function showSolution() {
        if (answered) return;
        handleChoice(shuffledData[currentIdx].a);
    }

    function restartQuiz() {
        initQuiz();
    }

    window.onload = initQuiz;
</script>

</body>
</html>
